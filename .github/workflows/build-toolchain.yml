name: Build Toolchain

permissions:
  contents: read
  pull-requests: write

on:
  workflow_call:
    inputs:
      game:
        required: true
        type: string
        description: "Game to build (Generals, GeneralsMD)"
      preset:
        required: true
        type: string
        description: "CMake preset"
      tools:
        required: false
        default: true
        type: boolean
        description: "Build tools"
      extras:
        required: false
        default: false
        type: boolean
        description: "Build extras"
    outputs:
      tempest_executable_sha256:
        description: "Two-build-proven Project Tempest executable SHA-256"
        value: ${{ jobs.build.outputs.tempest_executable_sha256 }}
      tempest_miles_sha256:
        description: "Two-build-proven Project Tempest Miles runtime SHA-256"
        value: ${{ jobs.build.outputs.tempest_miles_sha256 }}

jobs:
  build:
    name: ${{ inputs.preset }}${{ inputs.tools && '+t' || '' }}${{ inputs.extras && '+e' || '' }}
    runs-on: windows-2022
    timeout-minutes: 30
    outputs:
      tempest_executable_sha256: ${{ steps.tempest-package.outputs.tempest_executable_sha256 }}
      tempest_miles_sha256: ${{ steps.tempest-package.outputs.tempest_miles_sha256 }}

    env:
      VCPKG_FILE_CACHE: ${{ github.workspace }}\vcpkg-bincache
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}\vcpkg-bincache,readwrite
      VCPKG_FEATURE_FLAGS: manifests,versions,binarycaching

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # The package gate proves that the reviewed PR head is a parent of
          # GitHub's synthetic merge revision. A depth-one checkout hides that
          # relationship and cannot satisfy the provenance proof.
          fetch-depth: 2

      - name: Cache VC6 Installation
        if: startsWith(inputs.preset, 'vc6')
        id: cache-vc6
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: C:\VC6
          key: vc6-permanent-cache-v2

      - name: Cache CMake Dependencies
        id: cache-cmake-deps
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: build\${{ inputs.preset }}\_deps
          key: cmake-deps-${{ inputs.preset }}-${{ hashFiles('CMakePresets.json','cmake/**/*.cmake','**/CMakeLists.txt') }}

      - name: Clear cached Miles outputs for Project Tempest reproducibility
        if: ${{ inputs.game == 'Generals' && inputs.preset == 'win32' }}
        shell: pwsh
        run: |
          $workspace = [IO.Path]::GetFullPath("${{ github.workspace }}")
          $buildRoot = [IO.Path]::GetFullPath((Join-Path $workspace "build\${{ inputs.preset }}"))
          $milesBuild = [IO.Path]::GetFullPath((Join-Path $buildRoot "_deps\miles-build"))
          $allowedPrefix = $buildRoot.TrimEnd(
            [IO.Path]::DirectorySeparatorChar,
            [IO.Path]::AltDirectorySeparatorChar
          ) + [IO.Path]::DirectorySeparatorChar
          if (-not $milesBuild.StartsWith($allowedPrefix, [StringComparison]::OrdinalIgnoreCase)) {
            throw "Refusing to clear a Miles build directory outside '$buildRoot': '$milesBuild'."
          }
          if (Test-Path -LiteralPath $milesBuild) {
            $resolvedMilesBuild = (Resolve-Path -LiteralPath $milesBuild).Path
            if (-not $resolvedMilesBuild.StartsWith($allowedPrefix, [StringComparison]::OrdinalIgnoreCase)) {
              throw "Resolved Miles build directory escaped '$buildRoot': '$resolvedMilesBuild'."
            }
            Remove-Item -LiteralPath $resolvedMilesBuild -Recurse -Force
          }

      - name: Download VC6 Portable from itsmattkc repo
        if: ${{ startsWith(inputs.preset, 'vc6') && steps.cache-vc6.outputs.cache-hit != 'true' }}
        env:
          EXPECTED_HASH: "D0EE1F6DCEF7DB3AD703120D9FB4FAD49EBCA28F44372E40550348B1C00CA583"
          COMMIT: "001c4bafdcf2ef4b474d693acccd35a91e848f40"
        shell: pwsh
        run: |
          Write-Host "Downloading VC6 Portable Installation" -ForegroundColor Cyan
          Invoke-WebRequest -Uri https://github.com/itsmattkc/MSVC600/archive/$env:COMMIT.zip -OutFile VS6_VisualStudio6.zip

          Write-Host "Verifying File Integrity" -ForegroundColor Cyan
          $fileHash = (Get-FileHash -Path VS6_VisualStudio6.zip -Algorithm SHA256).Hash
          Write-Host "Downloaded file SHA256: $fileHash"
          Write-Host "Expected file SHA256: $env:EXPECTED_HASH"
          if ($fileHash -ne $env:EXPECTED_HASH) {
              Write-Error "Hash verification failed! File may be corrupted or tampered with."
              exit 1
          }

          Write-Host "Extracting Archive" -ForegroundColor Cyan
          & Expand-Archive -Path VS6_VisualStudio6.zip -DestinationPath C:\VC6
          Move-Item -Path C:\VC6\MSVC600-$env:COMMIT -Destination C:\VC6\VC6SP6
          Remove-Item VS6_VisualStudio6.zip -Verbose

      - name: Set Up VC6 Environment
        if: startsWith(inputs.preset, 'vc6')
        shell: pwsh
        run: |
          # Define the base directories as local variables first
          $VSCommonDir = "C:\VC6\VC6SP6\Common"
          $MSDevDir = "C:\VC6\VC6SP6\Common\msdev98"
          $MSVCDir = "C:\VC6\VC6SP6\VC98"
          $VcOsDir = "WINNT"

          # Set the variables in GitHub environment
          "VSCommonDir=$VSCommonDir" >> $env:GITHUB_ENV
          "MSDevDir=$MSDevDir" >> $env:GITHUB_ENV
          "MSVCDir=$MSVCDir" >> $env:GITHUB_ENV
          "VcOsDir=$VcOsDir" >> $env:GITHUB_ENV
          "PATH=$MSDevDir\BIN;$MSVCDir\BIN;$VSCommonDir\TOOLS\$VcOsDir;$VSCommonDir\TOOLS;$env:PATH" >> $env:GITHUB_ENV
          "INCLUDE=$MSVCDir\ATL\INCLUDE;$MSVCDir\INCLUDE;$MSVCDir\MFC\INCLUDE;$env:INCLUDE" >> $env:GITHUB_ENV
          "LIB=$MSVCDir\LIB;$MSVCDir\MFC\LIB;$env:LIB" >> $env:GITHUB_ENV

      - name: Set Up VC2022 Environment
        if: startsWith(inputs.preset, 'win32')
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
        with:
          arch: x86

      - name: Compute vcpkg cache key parts
        if: startsWith(inputs.preset, 'win32')
        id: vcpkg_key
        shell: pwsh
        run: |
          $baseline = (Get-Content vcpkg.json | ConvertFrom-Json)."builtin-baseline"

          $triplet = "x86-windows"
          if ("${{ inputs.preset }}" -like "x64*") { $triplet = "x64-windows" }

          "baseline=$baseline" >> $env:GITHUB_OUTPUT
          "triplet=$triplet" >> $env:GITHUB_OUTPUT

          Write-Host "vcpkg cache key parts: baseline=$baseline, triplet=$triplet"

      - name: Restore vcpkg binary cache
        if: startsWith(inputs.preset, 'win32')
        id: vcpkg_cache
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ${{ github.workspace }}\vcpkg-bincache
          key: vcpkg-bincache-v3-${{ runner.os }}-baseline${{ steps.vcpkg_key.outputs.baseline }}-${{ steps.vcpkg_key.outputs.triplet }}-${{ hashFiles('triplets/*.cmake') }}
          restore-keys: |
            vcpkg-bincache-v3-${{ runner.os }}-baseline${{ steps.vcpkg_key.outputs.baseline }}-
            vcpkg-bincache-v3-${{ runner.os }}-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@5e0cab206a5ea620130caf672fce3e4a6b5666a1 # v11.5
        with:
          runVcpkgInstall: false
          doNotCache: true

      - name: Configure vcpkg to use cached directory
        if: startsWith(inputs.preset, 'win32')
        shell: pwsh
        run: |
          $cacheDir = "${{ github.workspace }}\vcpkg-bincache"
          New-Item -ItemType Directory -Force -Path $cacheDir | Out-Null

          # lukka/run-vcpkg sets its own temp cache dir; override to force our cached dir
          $env:VCPKG_DEFAULT_BINARY_CACHE = $cacheDir
          $env:VCPKG_BINARY_SOURCES = "clear;files,$cacheDir,readwrite"

          "VCPKG_DEFAULT_BINARY_CACHE=$cacheDir" >> $env:GITHUB_ENV
          "VCPKG_BINARY_SOURCES=$env:VCPKG_BINARY_SOURCES" >> $env:GITHUB_ENV
          "VCPKG_OVERLAY_TRIPLETS=${{ github.workspace }}\triplets" >> $env:GITHUB_ENV
          "VCPKG_INSTALL_OPTIONS=--x-abi-tools-use-exact-versions" >> $env:GITHUB_ENV

      - name: Configure ${{ inputs.game }} with CMake Using ${{ inputs.preset }}${{ inputs.tools && '+t' || '' }}${{ inputs.extras && '+e' || '' }} Preset
        shell: pwsh
        run: |
          $buildFlags = @(
            "-DRTS_BUILD_ZEROHOUR=${{ inputs.game == 'GeneralsMD' && 'ON' || 'OFF' }}",
            "-DRTS_BUILD_GENERALS=${{ inputs.game == 'Generals' && 'ON' || 'OFF' }}"
          )

          $gamePrefix = "${{ inputs.game == 'Generals' && 'GENERALS' || 'ZEROHOUR' }}"
          $buildFlags += "-DRTS_BUILD_CORE_TOOLS=${{ inputs.tools && 'ON' || 'OFF' }}"
          $buildFlags += "-DRTS_BUILD_${gamePrefix}_TOOLS=${{ inputs.tools && 'ON' || 'OFF' }}"
          $buildFlags += "-DRTS_BUILD_CORE_EXTRAS=${{ inputs.extras && 'ON' || 'OFF' }}"
          $buildFlags += "-DRTS_BUILD_${gamePrefix}_EXTRAS=${{ inputs.extras && 'ON' || 'OFF' }}"

          Write-Host "Build flags: $($buildFlags -join ' | ')"
          cmake --preset ${{ inputs.preset }} $buildFlags

      - name: Build ${{ inputs.game }} with CMake Using ${{ inputs.preset }}${{ inputs.tools && '+t' || '' }}${{ inputs.extras && '+e' || '' }} Preset
        shell: pwsh
        run: |
          cmake --build --preset ${{ inputs.preset }}

      - name: Verify Project Tempest headless acceptance and private package
        if: ${{ inputs.game == 'Generals' && inputs.preset == 'win32' }}
        id: tempest-package
        shell: pwsh
        run: |
          $runtimeDirectory = "build\win32\ProjectTempest\Release"
          $reviewedSourceRevision = "${{ github.event.pull_request.head.sha || github.sha }}".ToLowerInvariant()
          if ($reviewedSourceRevision -notmatch '^[0-9a-f]{40}$') {
            throw "The exact reviewed source revision is unavailable: '$reviewedSourceRevision'."
          }
          & "$runtimeDirectory\project_tempest_headless_acceptance.exe" `
            --output "$runtimeDirectory\headless-acceptance.json"
          if ($LASTEXITCODE -ne 0) {
            throw "Project Tempest headless acceptance failed with exit code $LASTEXITCODE."
          }

          $milesStub = Get-ChildItem -Path "build\win32\_deps\miles-build" -Recurse -Filter "mss32.dll" -File |
            Select-Object -First 1
          if ($null -eq $milesStub) {
            throw "The GPL Miles stub was not produced by the win32 Release build."
          }

          # run-vcpkg materialises its pinned dependency checkout and binary cache
          # inside these two workspace roots. Exclude only those CI-owned roots,
          # then require every remaining source-tree status entry to be absent.
          $ciOwnedExcludes = @("/vcpkg/", "/vcpkg-bincache/")
          $existingExcludes = @(Get-Content -LiteralPath ".git/info/exclude" -ErrorAction SilentlyContinue)
          foreach ($exclude in $ciOwnedExcludes) {
            if ($exclude -notin $existingExcludes) {
              Add-Content -LiteralPath ".git/info/exclude" -Value $exclude
            }
          }
          $sourceStatus = @(git status --porcelain=v1 --untracked-files=all)
          if ($sourceStatus.Count -gt 0) {
            throw "Unexpected source-tree changes before packaging: $($sourceStatus -join ', ')."
          }

          $repeatBuild = "build\win32-tempest-repro"
          $repeatBuildFlags = @(
            "-DRTS_BUILD_ZEROHOUR=OFF",
            "-DRTS_BUILD_GENERALS=ON",
            "-DRTS_BUILD_CORE_TOOLS=${{ inputs.tools && 'ON' || 'OFF' }}",
            "-DRTS_BUILD_GENERALS_TOOLS=${{ inputs.tools && 'ON' || 'OFF' }}",
            "-DRTS_BUILD_CORE_EXTRAS=${{ inputs.extras && 'ON' || 'OFF' }}",
            "-DRTS_BUILD_GENERALS_EXTRAS=${{ inputs.extras && 'ON' || 'OFF' }}"
          )
          cmake --preset win32 -B $repeatBuild $repeatBuildFlags
          if ($LASTEXITCODE -ne 0) {
            throw "The isolated Project Tempest reproducibility configure failed with exit code $LASTEXITCODE."
          }
          cmake --build $repeatBuild --config Release --target project_tempest_demo project_tempest_headless_acceptance
          if ($LASTEXITCODE -ne 0) {
            throw "The isolated Project Tempest reproducibility build failed with exit code $LASTEXITCODE."
          }

          $repeatRuntimeDirectory = Join-Path $repeatBuild "ProjectTempest\Release"
          $repeatAcceptance = Join-Path $repeatRuntimeDirectory "headless-acceptance.json"
          & "$repeatRuntimeDirectory\project_tempest_headless_acceptance.exe" --output $repeatAcceptance
          if ($LASTEXITCODE -ne 0) {
            throw "The isolated Project Tempest headless acceptance failed with exit code $LASTEXITCODE."
          }
          if ((Get-FileHash -LiteralPath "$runtimeDirectory\headless-acceptance.json" -Algorithm SHA256).Hash -ne
              (Get-FileHash -LiteralPath $repeatAcceptance -Algorithm SHA256).Hash) {
            throw "The two isolated Project Tempest acceptance reports are not byte-identical."
          }

          $primaryExecutable = Join-Path $runtimeDirectory "ProjectTempestDemo.exe"
          $repeatExecutable = Join-Path $repeatRuntimeDirectory "ProjectTempestDemo.exe"
          $primaryExecutableHash = (Get-FileHash -LiteralPath $primaryExecutable -Algorithm SHA256).Hash.ToLowerInvariant()
          $repeatExecutableHash = (Get-FileHash -LiteralPath $repeatExecutable -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($primaryExecutableHash -ne $repeatExecutableHash) {
            throw "Integrated Release-build Project Tempest executables are not byte-identical: primary=$primaryExecutableHash repeat=$repeatExecutableHash."
          }
          Write-Host "PASS: Integrated Release-build Project Tempest executable reproducibility SHA256=$primaryExecutableHash"

          $repeatMilesStub = Get-ChildItem -Path "$repeatBuild\_deps\miles-build" -Recurse -Filter "mss32.dll" -File |
            Select-Object -First 1
          if ($null -eq $repeatMilesStub) {
            throw "The GPL Miles stub was not produced by the isolated win32 Release build."
          }

          $primaryMilesHash = (Get-FileHash -LiteralPath $milesStub.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          $repeatMilesHash = (Get-FileHash -LiteralPath $repeatMilesStub.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($primaryMilesHash -ne $repeatMilesHash) {
            throw "Integrated Release-build Miles stubs are not byte-identical: primary=$primaryMilesHash repeat=$repeatMilesHash."
          }
          Write-Host "PASS: Integrated Release-build Miles reproducibility SHA256=$primaryMilesHash"

          Copy-Item -LiteralPath $milesStub.FullName -Destination $runtimeDirectory -Force
          Copy-Item -LiteralPath $repeatMilesStub.FullName -Destination $repeatRuntimeDirectory -Force

          $primaryPackage = "build\win32\ProjectTempest\private-package"
          ./scripts/package-project-tempest-demo.ps1 `
            -RuntimeDirectory $runtimeDirectory `
            -OutputDirectory $primaryPackage `
            -ReviewedSourceRevision $reviewedSourceRevision `
            -ExpectedExecutableSha256 $primaryExecutableHash `
            -ExpectedMilesStubSha256 $primaryMilesHash

          $repeatPackage = "$repeatBuild\ProjectTempest\private-package"
          ./scripts/package-project-tempest-demo.ps1 `
            -RuntimeDirectory $repeatRuntimeDirectory `
            -OutputDirectory $repeatPackage `
            -ReviewedSourceRevision $reviewedSourceRevision `
            -ExpectedExecutableSha256 $primaryExecutableHash `
            -ExpectedMilesStubSha256 $primaryMilesHash

          $primaryArchive = Join-Path $primaryPackage "ProjectTempestDemo-private.zip"
          $repeatArchive = Join-Path $repeatPackage "ProjectTempestDemo-private.zip"
          $primaryHash = (Get-FileHash -LiteralPath $primaryArchive -Algorithm SHA256).Hash.ToLowerInvariant()
          $repeatHash = (Get-FileHash -LiteralPath $repeatArchive -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($primaryHash -ne $repeatHash) {
            throw "Independent Release-build packages are not byte-identical: primary=$primaryHash repeat=$repeatHash."
          }
          Write-Host "PASS: Independent Release-build package reproducibility SHA256=$primaryHash"
          "tempest_executable_sha256=$primaryExecutableHash" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tempest_miles_sha256=$primaryMilesHash" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Save vcpkg binary cache
        # Only one job should save to avoid "Unable to reserve cache" conflicts.
        if: ${{ startsWith(inputs.preset, 'win32') && steps.vcpkg_cache.outputs.cache-hit != 'true' && inputs.game == 'Generals' && inputs.preset == 'win32-vcpkg-debug' }}
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ${{ github.workspace }}\vcpkg-bincache
          key: vcpkg-bincache-v3-${{ runner.os }}-baseline${{ steps.vcpkg_key.outputs.baseline }}-${{ steps.vcpkg_key.outputs.triplet }}-${{ hashFiles('triplets/*.cmake') }}

      - name: Collect ${{ inputs.game }} ${{ inputs.preset }}${{ inputs.tools && '+t' || '' }}${{ inputs.extras && '+e' || '' }} Artifact
        shell: pwsh
        run: |
          $buildDir = "build\${{ inputs.preset }}"
          $artifactsDir = New-Item -ItemType Directory -Force -Path "$buildDir\${{ inputs.game }}\artifacts" -Verbose

          if ("${{ inputs.preset }}" -like "win32*") {
            $configToUse = if ("${{ inputs.preset }}" -match "debug") { "Debug" } else { "Release" }
            $artifactSources = @(
              "$buildDir\Core\$configToUse"
              "$buildDir\${{ inputs.game }}\$configToUse"
            )
            $files = Get-ChildItem -Path $artifactSources -File |
              Where-Object { $_.Extension -in @(".exe", ".dll", ".pdb", ".w3d", ".tga", ".wav", ".txt") } -Verbose
          } else {
            $files = Get-ChildItem -Path "$buildDir\Core","$buildDir\${{ inputs.game }}" -File |
              Where-Object { $_.Extension -in @(".exe", ".dll", ".pdb") } -Verbose
          }

          $files | Move-Item -Destination $artifactsDir -Verbose -Force

          if ("${{ inputs.preset }}" -like "win32*") {
            $milesStub = Get-ChildItem -Path "$buildDir\_deps\miles-build" -Recurse -Filter "mss32.dll" -File |
              Select-Object -First 1
            if ($null -eq $milesStub) {
              throw "The GPL Miles stub was not produced by the win32 build."
            }
            Copy-Item -LiteralPath $milesStub.FullName -Destination $artifactsDir -Force -Verbose

            if ("${{ inputs.game }}" -eq "Generals" -and "${{ inputs.preset }}" -eq "win32") {
              $privatePackage = "$buildDir\ProjectTempest\private-package\ProjectTempestDemo-private.zip"
              if (-not (Test-Path -LiteralPath $privatePackage -PathType Leaf)) {
                throw "The governed Project Tempest private package was not produced."
              }
              Copy-Item -LiteralPath $privatePackage -Destination $artifactsDir -Force -Verbose
            }

            # Project Tempest must enter the outer CI artifact only through its
            # governed ZIP. The Miles stub remains a shared Generals runtime
            # dependency and is independently copied above. The same boundary
            # implementation is executed by the adversarial package tests.
            $expectedPrivatePackageCount = if (
              "${{ inputs.game }}" -eq "Generals" -and "${{ inputs.preset }}" -eq "win32"
            ) { 1 } else { 0 }
            ./scripts/assert-project-tempest-artifact-boundary.ps1 `
              -ArtifactDirectory $artifactsDir.FullName `
              -ExpectedPrivatePackageCount $expectedPrivatePackageCount
          }

      - name: Upload ${{ inputs.game }} ${{ inputs.preset }}${{ inputs.tools && '+t' || '' }}${{ inputs.extras && '+e' || '' }} Artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ inputs.game }}-${{ inputs.preset }}${{ inputs.tools && '+t' || '' }}${{ inputs.extras && '+e' || '' }}
          path: build\${{ inputs.preset }}\${{ inputs.game }}\artifacts
          retention-days: 30
          if-no-files-found: error
