name: GenCI

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  detect-changes:
    name: Detect File Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      generals: ${{ steps.filter.outputs.generals }}
      generalsmd: ${{ steps.filter.outputs.generalsmd }}
      shared: ${{ steps.filter.outputs.shared }}
      tempest: ${{ steps.filter.outputs.tempest }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Filter Changed Paths
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          token: ''
          filters: |
            generals:
              - 'Generals/**'
            generalsmd:
              - 'GeneralsMD/**'
            shared:
              - '.github/workflows/**'
              - 'CMakeLists.txt'
              - 'CMakePresets.json'
              - 'cmake/**'
              - 'Core/**'
              - 'Dependencies/**'
            tempest:
              - '.github/workflows/ci.yml'
              - '.github/workflows/build-toolchain.yml'
              - 'ProjectTempest/**'
              - 'PROJECT_TEMPEST*.md'
              - 'scripts/build-windows.ps1'
              - 'scripts/create-courier-blockout.*'
              - 'scripts/create-substation-kit.*'
              - 'scripts/create-tempest-audio.py'
              - 'scripts/prepare-w3dview-compat.ps1'
              - 'scripts/package-project-tempest-demo.ps1'
              - 'scripts/assert-project-tempest-artifact-boundary.ps1'
              - 'scripts/assert-project-tempest-private-package.ps1'
              - 'scripts/test-project-tempest-package.ps1'
              - 'scripts/test-project-tempest-assets.ps1'
              - 'scripts/test-project-tempest-no-gui.ps1'
              - 'scripts/test-project-tempest-reproducibility.ps1'
              - 'scripts/test-w3d-pipeline.*'

      - name: Changes Summary
        run: |
          echo "### 🔍 File Changes Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Generals: ${{ steps.filter.outputs.generals == 'true' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
          echo "- GeneralsMD: ${{ steps.filter.outputs.generalsmd == 'true' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Shared: ${{ steps.filter.outputs.shared == 'true' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY

  validate-project-tempest-assets:
    name: Validate Project Tempest Assets
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.tempest == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate provenance, hashes, and Courier W3D contract
        shell: pwsh
        run: |
          ./scripts/test-project-tempest-assets.ps1
          ./scripts/test-project-tempest-no-gui.ps1
          ./scripts/test-project-tempest-package.ps1

      - name: Compile and run deterministic Substation 9 simulation, interface, and full-match acceptance tests
        shell: bash
        run: |
          g++ -std=c++20 -Wall -Wextra -Werror -pedantic \
            ProjectTempest/Code/TempestAccessibility.cpp \
            ProjectTempest/Code/TempestAudio.cpp \
            ProjectTempest/Code/TempestInterface.cpp \
            ProjectTempest/Code/TempestSimulation.cpp \
            ProjectTempest/Tests/TempestSimulationTests.cpp \
            -IProjectTempest/Code \
            -o "$RUNNER_TEMP/project-tempest-sim-tests"
          "$RUNNER_TEMP/project-tempest-sim-tests"
          g++ -std=c++20 -Wall -Wextra -Werror -pedantic \
            ProjectTempest/Code/TempestAccessibility.cpp \
            ProjectTempest/Code/TempestInterface.cpp \
            ProjectTempest/Code/TempestSimulation.cpp \
            ProjectTempest/Tests/TempestHeadlessAcceptance.cpp \
            -IProjectTempest/Code \
            -o "$RUNNER_TEMP/project-tempest-headless-acceptance"
          "$RUNNER_TEMP/project-tempest-headless-acceptance" \
            --output "$RUNNER_TEMP/project-tempest-headless-acceptance.json"

  build-generals:
    name: Build Generals${{ matrix.preset && '' }}
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.generals == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.tempest == 'true' }}
    strategy:
      matrix:
        include:
          - preset: "vc6"
            tools: true
            extras: true
          - preset: "vc6-profile"
            tools: true
            extras: true
          - preset: "vc6-debug"
            tools: true
            extras: true
          - preset: "win32"
            tools: true
            extras: true
          - preset: "win32-profile"
            tools: true
            extras: true
          - preset: "win32-debug"
            tools: true
            extras: true
          #- preset: "win32-vcpkg"
          #  tools: true
          #  extras: true
          #- preset: "win32-vcpkg-profile"
          #  tools: true
          #  extras: true
          #- preset: "win32-vcpkg-debug"
          #  tools: true
          #  extras: true
      fail-fast: false
    uses: ./.github/workflows/build-toolchain.yml
    with:
      game: "Generals"
      preset: ${{ matrix.preset }}
      tools: ${{ matrix.tools }}
      extras: ${{ matrix.extras }}
    secrets: inherit

  verify-project-tempest-private-install:
    name: Verify Project Tempest Private Install
    needs:
      - detect-changes
      - build-generals
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.tempest == 'true' }}
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 2

      - name: Download governed Project Tempest private package
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: Generals-win32+t+e
          path: ${{ runner.temp }}\project-tempest-outer-artifact

      - name: Verify and stage private package without execution
        shell: pwsh
        env:
          EXPECTED_REVIEWED_SOURCE_REVISION: ${{ github.event.pull_request.head.sha || github.sha }}
          EXPECTED_TEMPEST_EXECUTABLE_SHA256: ${{ needs.build-generals.outputs.tempest_executable_sha256 }}
          EXPECTED_TEMPEST_MILES_SHA256: ${{ needs.build-generals.outputs.tempest_miles_sha256 }}
        run: |
          $outerArtifact = Join-Path $env:RUNNER_TEMP "project-tempest-outer-artifact"
          ./scripts/assert-project-tempest-artifact-boundary.ps1 `
            -ArtifactDirectory $outerArtifact `
            -ExpectedPrivatePackageCount 1

          $privatePackages = @(
            Get-ChildItem -LiteralPath $outerArtifact -Recurse -File -Force |
              Where-Object { $_.Name -eq "ProjectTempestDemo-private.zip" }
          )
          if ($privatePackages.Count -ne 1) {
            throw "Fresh consumer expected exactly one governed Project Tempest private package."
          }

          $buildSourceRevision = (git rev-parse HEAD).Trim().ToLowerInvariant()
          if ($LASTEXITCODE -ne 0 -or $buildSourceRevision -notmatch '^[0-9a-f]{40}$') {
            throw "Fresh consumer could not resolve its exact build source revision."
          }
          $reviewedSourceRevision = $env:EXPECTED_REVIEWED_SOURCE_REVISION.Trim().ToLowerInvariant()
          if ($reviewedSourceRevision -notmatch '^[0-9a-f]{40}$') {
            throw "Fresh consumer did not receive an exact reviewed source revision."
          }
          $expectedExecutableSha256 = ([string]$env:EXPECTED_TEMPEST_EXECUTABLE_SHA256).Trim().ToLowerInvariant()
          $expectedMilesSha256 = ([string]$env:EXPECTED_TEMPEST_MILES_SHA256).Trim().ToLowerInvariant()
          if ($expectedExecutableSha256 -notmatch '^[0-9a-f]{64}$' -or
              $expectedMilesSha256 -notmatch '^[0-9a-f]{64}$') {
            throw "Fresh consumer did not receive the governing job's two-build binary hashes."
          }

          $installDirectory = Join-Path $env:RUNNER_TEMP "project-tempest-clean-install"
          $receiptPath = Join-Path $env:RUNNER_TEMP "project-tempest-clean-install-receipt.json"
          ./scripts/assert-project-tempest-private-package.ps1 `
            -PackagePath $privatePackages[0].FullName `
            -InstallDirectory $installDirectory `
            -ReceiptPath $receiptPath `
            -ExpectedBuildSourceRevision $buildSourceRevision `
            -ExpectedReviewedSourceRevision $reviewedSourceRevision `
            -ExpectedExecutableSha256 $expectedExecutableSha256 `
            -ExpectedMilesStubSha256 $expectedMilesSha256

          $receipt = Get-Content -LiteralPath $receiptPath -Raw | ConvertFrom-Json
          $contract = Get-Content -LiteralPath "./ProjectTempest/package-contract.json" -Raw | ConvertFrom-Json
          $expectedInstalledFileCount = @($contract.runtime_files).Count + @($contract.repository_files).Count + 2
          if ([string]$receipt.verification -ne "verified_without_execution" -or
              [string]$receipt.renderer_execution -ne "not_performed" -or
              $receipt.manual_playthrough_claimed -ne $false -or
              $receipt.installed_file_count -ne $expectedInstalledFileCount) {
            throw "Fresh consumer receipt does not preserve the governed no-execution install state."
          }
          Get-Content -LiteralPath $receiptPath -Raw
          Write-Host "Receipt SHA256: $((Get-FileHash -LiteralPath $receiptPath -Algorithm SHA256).Hash.ToLowerInvariant())"

  # Note build-generalsmd is split into two jobs for vc6 and win32 because replaycheck-generalsmd
  # only requires the vc6 build and compiling vc6 is much faster than win32
  build-generalsmd-vc6:
    name: Build GeneralsMD${{ matrix.preset && '' }}
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.generalsmd == 'true' || needs.detect-changes.outputs.shared == 'true' }}
    strategy:
      matrix:
        include:
          - preset: "vc6"
            tools: true
            extras: true
          - preset: "vc6-profile"
            tools: true
            extras: true
          - preset: "vc6-debug"
            tools: true
            extras: true
          - preset: "vc6-releaselog"
            tools: true
            extras: true
      fail-fast: false
    uses: ./.github/workflows/build-toolchain.yml
    with:
      game: "GeneralsMD"
      preset: ${{ matrix.preset }}
      tools: ${{ matrix.tools }}
      extras: ${{ matrix.extras }}
    secrets: inherit

  build-generalsmd-win32:
    name: Build GeneralsMD${{ matrix.preset && '' }}
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.generalsmd == 'true' || needs.detect-changes.outputs.shared == 'true' }}
    strategy:
      matrix:
        include:
          - preset: "win32"
            tools: true
            extras: true
          - preset: "win32-profile"
            tools: true
            extras: true
          - preset: "win32-debug"
            tools: true
            extras: true
          #- preset: "win32-vcpkg"
          #  tools: true
          #  extras: true
          #- preset: "win32-vcpkg-profile"
          #  tools: true
          #  extras: true
          #- preset: "win32-vcpkg-debug"
          #  tools: true
          #  extras: true
      fail-fast: false
    uses: ./.github/workflows/build-toolchain.yml
    with:
      game: "GeneralsMD"
      preset: ${{ matrix.preset }}
      tools: ${{ matrix.tools }}
      extras: ${{ matrix.extras }}
    secrets: inherit

  replaycheck-generalsmd:
    name: Replay Check GeneralsMD${{ matrix.preset && '' }}
    needs: build-generalsmd-vc6
    # The encrypted retail-data fixture is private to the community repository. Downstream forks must explicitly
    # provide an equivalent legal fixture and opt in with the REPLAY_CHECK_ENABLED repository variable.
    if: ${{ (github.repository == 'TheSuperHackers/GeneralsGameCode' || vars.REPLAY_CHECK_ENABLED == 'true') && (github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.generalsmd == 'true' || needs.detect-changes.outputs.shared == 'true') }}
    strategy:
      matrix:
        include:
          - preset: "vc6+t+e"
          - preset: "vc6-releaselog+t+e" # optimized build with logging and crashing enabled should be compatible, so we test that here.
      fail-fast: false
    uses: ./.github/workflows/check-replays.yml
    with:
      game: "GeneralsMD"
      userdata: "GeneralsReplays/GeneralsZH/1.04"
      preset: ${{ matrix.preset }}
    secrets: inherit
